name: Rebrand do-not-touch gate

# Diff-scoped enforcement of the ADR-0003 D4 do-not-touch boundary + the
# Tier-3-deferred skeleton (ADR-0004 L2). Fails a PR that corrupts a protected
# token (e.g. X-Hermes-* → X-ViloForge-*, hermes-3 → viloforge-3, hermes_cli →
# viloforge_cli). Pure-stdlib; runs in seconds. Triggered only through the CI
# orchestrator (ci.yml) via workflow_call.

on:
  workflow_call:

permissions:
  contents: read

jobs:
  rebrand-guard:
    name: Rebrand do-not-touch gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0 # full history so we can diff against the PR base

      - name: Guard contract tests (exclusions / transform / diff-gate / completeness)
        run: |
          python3 docs/viloforge/rebrand/test_exclusions.py
          python3 docs/viloforge/rebrand/test_rebrand_apply.py
          python3 docs/viloforge/rebrand/test_diff_gate.py
          python3 docs/viloforge/rebrand/test_completeness.py

      - name: Gate the PR diff for do-not-touch corruption
        run: |
          git fetch --no-tags origin main:refs/remotes/origin/main
          python3 docs/viloforge/rebrand/diff_gate.py --base origin/main --head HEAD

      # HARD repo-wide gate (ADR-0004 L3). Tier-1d display rebrand is COMPLETE —
      # every product surface (CLI, TUI, Web, Docs, Desktop, Gateway, Plugins,
      # Skills, Agent core, Tests, Other) is at zero residual display-brand tokens.
      # This fails any PR that reintroduces a `\bHermes\b` display token outside the
      # do-not-touch boundary (Tier-3 skeleton / Nous) and the intentional-keep set
      # (fork notices, copyright, third-party attribution). The exemption surface is
      # the source of truth; widen it deliberately, never to mask a real residual.
      - name: Completeness gate (zero residual display-brand tokens, repo-wide)
        run: python3 docs/viloforge/rebrand/completeness.py --max 0

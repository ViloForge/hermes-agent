name: Viloforge Docker Publish

# Fork-owned workflow — NOT inherited from upstream NousResearch/hermes-agent.
#
# Upstream's `docker-publish.yml` is gated `if: github.repository ==
# 'NousResearch/hermes-agent'` and pushes to Docker Hub, so it never publishes on
# our fork. This workflow builds OUR fork's image and publishes it to GHCR at
# ghcr.io/viloforge/hermes-agent. It lives in a separate file (not a patch to
# upstream's) so that backporting upstream changes stays conflict-free.
#
# Scope: amd64 only (the hetzner-1 deploy target). arm64 can be added later via a
# native `ubuntu-24.04-arm` runner + manifest merge — the pattern upstream uses.
#
# Tags: push to main → :latest + :sha; v* tag → semver tags; a manual
# `workflow_dispatch` run also publishes a pinned `:preview` channel for operator
# hands-on evaluation (see docs/viloforge/preview.md). Dispatch with a `ref` to
# build a specific branch/tag/SHA.

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to build (branch, tag, or SHA)
        required: false
        default: main

permissions:
  contents: read
  packages: write

concurrency:
  group: viloforge-publish-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  IMAGE: ghcr.io/viloforge/viloforge-agent

jobs:
  build-and-push:
    # Only on our fork — never if someone forks this fork.
    if: github.repository == 'ViloForge/hermes-agent'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=preview,enable=${{ github.event_name == 'workflow_dispatch' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      # Build amd64 and load into the local daemon so the smoke test can run
      # before we publish anything.
      - name: Build (amd64, load for smoke test)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          load: true
          platforms: linux/amd64
          tags: ${{ env.IMAGE }}:smoke
          build-args: |
            HERMES_GIT_SHA=${{ github.sha }}
          cache-from: type=gha,scope=viloforge-amd64
          cache-to: type=gha,mode=max,scope=viloforge-amd64

      - name: Smoke test image
        uses: ./.github/actions/hermes-smoke-test
        with:
          image: ${{ env.IMAGE }}:smoke

      - name: Build and push (amd64)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            HERMES_GIT_SHA=${{ github.sha }}
          cache-from: type=gha,scope=viloforge-amd64
          cache-to: type=gha,mode=max,scope=viloforge-amd64
